# Render.com deployment configuration
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: funding-aggregator
    runtime: node
    region: frankfurt          # closest to Kazakhstan
    plan: free                  # free tier (or starter for production)

    # Build settings
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/server.js

    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: funding-aggregator-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true      # Render auto-generates a secure value
      - key: FRONTEND_ROOT
        value: /opt/render/project/src

    # Health check
    healthCheckPath: /api/health

    # Auto-deploy on push to main
    autoDeploy: true

databases:
  - name: funding-aggregator-db
    databaseName: funding_aggregator
    user: funding_user
    plan: free
    region: frankfurt
